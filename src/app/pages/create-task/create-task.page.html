<ion-content [fullscreen]="true" class="transparent">
  <div class="screen">
    <div class="header">
      <app-glass [radius]="999" class="icon-btn" (click)="back()">
        <app-icon name="close" [size]="16" />
      </app-glass>
      <div class="header__title">Nueva tarea</div>
      <span class="header__spacer"></span>
    </div>

    <div class="body">
      <app-glass
        [radius]="24"
        class="hero"
        [style.background]="selectedCat()
          ? 'linear-gradient(135deg, ' + selectedCat()!.color + '25, rgba(255,255,255,0.5))'
          : null"
      >
        <div class="hero__cat" [style.color]="selectedCat()?.color">
          {{ selectedCat()?.icon }} {{ selectedCat()?.name || 'Sin categoría' }}
        </div>
        <input
          class="hero__input"
          type="text"
          autofocus
          placeholder="Mi nueva tarea..."
          [ngModel]="title()"
          (ngModelChange)="title.set($event)"
        />
      </app-glass>

      <div class="label">Categoría</div>
      <div class="cat-grid">
        @for (c of store.categories(); track c.id) {
          <app-glass
            [radius]="14"
            class="cat"
            [class.cat--active]="categoryId() === c.id"
            [style.background]="categoryId() === c.id
              ? 'linear-gradient(135deg, ' + c.color + ', ' + c.color + 'cc)'
              : null"
            [style.box-shadow]="categoryId() === c.id ? '0 4px 12px ' + c.color + '40' : null"
            (click)="categoryId.set(c.id)"
          >
            <div class="cat__icon">{{ c.icon }}</div>
            <div class="cat__name">{{ c.name }}</div>
          </app-glass>
        }
      </div>

      <div class="row">
        <app-glass [radius]="14" class="segment">
          <div class="segment__label">Prioridad</div>
          <div class="segment__options">
            @for (p of priorities; track p) {
              <button type="button" class="segment__opt"
                [class.segment__opt--active]="priority() === p"
                (click)="priority.set(p)">{{ p }}</button>
            }
          </div>
        </app-glass>
        <app-glass [radius]="14" class="segment">
          <div class="segment__label">Fecha</div>
          <div class="segment__options">
            @for (d of dues; track d) {
              <button type="button" class="segment__opt"
                [class.segment__opt--active]="due() === d"
                (click)="due.set(d)">{{ d }}</button>
            }
          </div>
        </app-glass>
      </div>
    </div>

    <div class="submit">
      <app-glass
        [radius]="999"
        [blur]="30"
        class="submit-btn"
        [class.submit-btn--ready]="canSave()"
        (click)="submit()"
      >
        Guardar tarea
      </app-glass>
    </div>
  </div>
</ion-content>
